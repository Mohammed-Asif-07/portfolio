<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | Mohammed Asif</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .thank-you-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .thank-you-card {
            background: rgba(255, 255, 255, 0.82);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(148, 163, 184, 0.22);
            border-radius: 1.5rem;
            padding: 3rem 2rem;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 18px 45px rgba(15, 23, 42, 0.13);
            animation: fadeSlideUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
            position: relative;
            z-index: 10;
        }
        .success-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #10b981, #059669);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
            color: white;
            box-shadow: 0 12px 24px rgba(16, 185, 129, 0.3);
            animation: scaleIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) 0.3s both;
        }
        .success-icon svg {
            width: 40px;
            height: 40px;
        }
        .thank-you-title {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: var(--foreground);
        }
        .thank-you-message {
            color: var(--muted);
            font-size: 1.125rem;
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }
        @keyframes scaleIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        
        /* Inherit blobs animation from style.css */
        .hero-background {
            position: absolute;
            inset: 0;
            z-index: 0;
        }
    </style>
</head>
<body>
    <div class="hero-background">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>
    
    <section class="thank-you-section">
        <div class="thank-you-card">
            <div class="success-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
            </div>
            <h1 class="thank-you-title">Thank You!</h1>
            <p class="thank-you-message">Your message has been successfully sent. I appreciate you reaching out and will get back to you as soon as possible.</p>
            <a href="index.html" class="btn btn-primary">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 0.5rem;">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                Back to Home
            </a>
        </div>
    </section>
</body>
</html>
